<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Socratic Prep — {{MEETUP_TITLE}}</title>
<style>
  :root {
    --bg: #0f1117;
    --panel: #171a23;
    --panel-2: #1e222e;
    --ink: #e7e9ee;
    --muted: #9aa3b2;
    --accent: #7c9cff;
    --accent-2: #5ce0c6;
    --coach: #232a3d;
    --learner: #2b2238;
    --border: #2a2f3d;
    --shadow: 0 8px 30px rgba(0,0,0,.35);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: radial-gradient(1200px 600px at 70% -10%, #1b2030 0%, var(--bg) 60%);
    color: var(--ink);
    font: 16px/1.65 ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 820px; margin: 0 auto; padding: 0 20px 80px; }
  header.hero {
    padding: 64px 0 28px; text-align: center;
  }
  .badge {
    display: inline-block; font-size: 12px; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent-2); border: 1px solid var(--border); border-radius: 999px;
    padding: 6px 14px; margin-bottom: 18px; background: var(--panel);
  }
  h1 {
    font-size: clamp(28px, 5vw, 44px); line-height: 1.1; margin: 0 0 12px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .subtitle { color: var(--muted); font-size: 18px; margin: 0 auto; max-width: 620px; }
  nav.toc {
    background: var(--panel); border: 1px solid var(--border); border-radius: 14px;
    padding: 18px 22px; margin: 32px 0; box-shadow: var(--shadow);
  }
  nav.toc h2 { font-size: 13px; text-transform: uppercase; letter-spacing: .12em; color: var(--muted); margin: 0 0 10px; }
  nav.toc a { color: var(--accent); text-decoration: none; }
  nav.toc a:hover { text-decoration: underline; }
  nav.toc ol { margin: 0; padding-left: 20px; }
  section.reading { margin: 48px 0; }
  section.reading > h2 {
    font-size: 26px; margin: 0 0 6px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
  }
  .reading-tag { color: var(--muted); font-size: 14px; margin: 0 0 20px; }
  .turn { display: flex; gap: 12px; margin: 16px 0; }
  .turn .who {
    flex: 0 0 auto; width: 40px; height: 40px; border-radius: 50%;
    display: grid; place-items: center; font-weight: 700; font-size: 14px;
  }
  .turn.coach .who { background: linear-gradient(135deg, var(--accent), #4d6bff); color: #0b0e16; }
  .turn.learner .who { background: linear-gradient(135deg, var(--accent-2), #2bbfa0); color: #06120f; }
  .bubble {
    background: var(--coach); border: 1px solid var(--border); border-radius: 14px;
    padding: 12px 16px; box-shadow: var(--shadow); max-width: 100%;
  }
  .turn.learner { flex-direction: row-reverse; }
  .turn.learner .bubble { background: var(--learner); }
  .bubble .name { font-size: 12px; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin-bottom: 4px; }
  .bubble p { margin: 6px 0; }
  .insight {
    margin-top: 8px; font-size: 13px; color: var(--accent-2);
    border-left: 2px solid var(--accent-2); padding-left: 10px;
  }
  .takeaways {
    background: linear-gradient(180deg, var(--panel-2), var(--panel));
    border: 1px solid var(--border); border-radius: 14px; padding: 22px 24px; margin: 28px 0;
    box-shadow: var(--shadow);
  }
  .takeaways h3 { margin: 0 0 12px; font-size: 18px; }
  .takeaways ul { margin: 0; padding-left: 20px; }
  .takeaways li { margin: 8px 0; }
  footer {
    margin-top: 64px; padding-top: 24px; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 14px; text-align: center;
  }
  a { color: var(--accent); }
  code { background: var(--panel-2); padding: 1px 6px; border-radius: 6px; font-size: .9em; }
</style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="badge">Socratic Prep · {{MEETUP_DATE}}</div>
      <h1>{{MEETUP_TITLE}}</h1>
      <p class="subtitle">{{INTRO}}</p>
    </header>

    <!-- DIALOGUE -->

    <footer>
      Generated by the <code>socratic-reading</code> skill · a guided study session with Claude (Opus).
    </footer>
  </div>
</body>
</html>

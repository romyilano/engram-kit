<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spike 003 — Auto-extracted VN · ENGRAM // KIT</title>
<style>
  :root{--ink:#0b0b0d;--paper:#f3f1ec;--signal:#00e0a4;--smoke:#8a8a86;--stale:#d98a3d;
    --hairline:rgba(255,255,255,.16);--mono:ui-monospace,Menlo,Consolas,monospace;--sans:"Helvetica Neue",Helvetica,Arial,sans-serif;}
  *{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}
  body{background:var(--ink);color:var(--paper);font-family:var(--sans);display:grid;place-items:center;min-height:100%;overflow:hidden}
  #stage{position:relative;width:min(96vw,1100px);aspect-ratio:16/9;background:#000;overflow:hidden;border:1px solid var(--hairline);user-select:none;cursor:pointer}
  #bg{position:absolute;inset:0;background-size:cover;background-position:center;filter:grayscale(.5) brightness(.62)}
  #scrim{position:absolute;inset:0;background:linear-gradient(180deg,rgba(11,11,13,.15),rgba(11,11,13,.05) 44%,rgba(11,11,13,.93))}
  #hud{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:.7rem 1rem;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;color:var(--smoke)}
  #hud .mark{color:var(--paper);font-weight:700}#hud .mark b{color:var(--signal)}#src{font-family:var(--mono);letter-spacing:.06em}
  #name{position:absolute;left:5%;bottom:31%;padding:.35rem 1rem;background:var(--signal);color:var(--ink);font-weight:700;font-size:1.05rem;transform:skewX(-6deg);opacity:0;transition:opacity .15s}
  #name span{display:inline-block;transform:skewX(6deg)}#name.show{opacity:1}
  #name.examiner{background:var(--stale)}#name.metaagent{background:var(--paper)}
  #name.narrator{background:transparent;color:var(--smoke);font-weight:400;letter-spacing:.22em;text-transform:uppercase;font-size:.62rem;transform:none}
  #name.narrator span{transform:none}
  #box{position:absolute;left:5%;right:5%;bottom:8%;min-height:22%;border-top:1px solid var(--hairline);padding:1.1rem .2rem 0}
  #line{font-size:clamp(1rem,2.2vw,1.45rem);line-height:1.5;max-width:64ch}#line em{color:var(--signal);font-style:normal}
  #advance{position:absolute;right:5%;bottom:8%;color:var(--smoke);font-size:.62rem;letter-spacing:.22em;text-transform:uppercase}#advance b{color:var(--signal)}
  #err{position:absolute;inset:0;display:none;place-items:center;text-align:center;padding:2rem;color:var(--smoke);font-family:var(--mono);font-size:.85rem;line-height:1.7}
  #err code{color:var(--signal)}
</style>
</head>
<body>
<div id="stage">
  <div id="bg"></div><div id="scrim"></div>
  <div id="hud"><span class="mark">ENGRAM<b>//</b>KIT</span><span id="src">auto-extracted · page —</span></div>
  <div id="name"><span></span></div>
  <div id="box"><div id="line"></div></div>
  <div id="advance">click / <b>space</b> ▸</div>
  <div id="err"></div>
</div>
<!-- the script is GENERATED by extract.js from the existing manga lettering blocks -->
<script src="script.js"></script>
<script>
const NAMES={engy:'ENGY',sensei:'SENSEI',examiner:'THE EXAMINER',metaagent:'META AGENT',narrator:'NARRATION'};
const bg=document.getElementById('bg'),nameEl=document.getElementById('name'),lineEl=document.getElementById('line'),
 advanceEl=document.getElementById('advance'),srcEl=document.getElementById('src'),stage=document.getElementById('stage');
const S=window.VN_SCRIPT;
let i=0,typing=false,full='',timer=null;

if(!S||!S.length){
 document.getElementById('err').style.display='grid';
 document.getElementById('err').innerHTML='No script loaded.<br>Run <code>node extract.js</code> first to generate <code>script.js</code> from the manga lettering blocks.';
}

function typeOut(html){typing=true;full=html;lineEl.innerHTML='';
 const tokens=html.split(/(<[^>]+>)/),queue=[];
 tokens.forEach(t=>{if(t.startsWith('<'))queue.push({tag:t});else for(const ch of t)queue.push({ch});});
 let k=0,out='';(function step(){if(k>=queue.length){typing=false;lineEl.innerHTML=full;return;}
  const q=queue[k++];out+=q.tag||q.ch;lineEl.innerHTML=out+'<span style="color:var(--signal)">▌</span>';timer=setTimeout(step,q.tag?0:14);})();}
function finishTyping(){if(typing){clearTimeout(timer);typing=false;lineEl.innerHTML=full;return true;}return false;}

function render(){
 if(!S)return; if(i>=S.length){lineEl.textContent='— end of auto-extracted ALMA script —';nameEl.className='';advanceEl.style.display='none';return;}
 const n=S[i];
 bg.style.backgroundImage=`url('${n.bg}')`;
 srcEl.textContent=`auto-extracted · page ${n.page}`;
 nameEl.className='show '+(n.speaker==='examiner'?'examiner':n.speaker==='metaagent'?'metaagent':n.speaker==='narrator'?'narrator':'');
 nameEl.querySelector('span').textContent=NAMES[n.speaker]||n.speaker.toUpperCase();
 typeOut(n.text);
}
function advance(){if(finishTyping())return;i++;render();}
stage.addEventListener('click',advance);
document.addEventListener('keydown',e=>{if(e.code==='Space'||e.code==='Enter'){e.preventDefault();advance();}});
render();
</script>
</body>
</html>
